<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ab Testing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="step-container">
        <div class="container">
            <h2>Step 6 of 7: A/B Testing</h2>
            <div class="progress-bar">
                <div class="step done">1</div>
                <div class="step done">2</div>
                <div class="step done">3</div>
                <div class="step done">4</div>
                <div class="step done">5</div>
                <div class="step">6</div>
                <div class="step">7</div>
            </div>

            <p><strong>Instructions:</strong> Based on your experience, please indicate which version of the system you preferred and explain why.</p>

            <form method="post">
                <label for="ab_preference">Which version did you prefer? (A or B)</label>
                <input type="text" name="ab_preference" id="ab_preference" required value="{{ ab_preference or '' }}">

                <label for="ab_reason">Why did you prefer that version?</label>
                <textarea name="ab_reason" id="ab_reason" rows="4" required>{{ ab_reason or '' }}</textarea>

                <button type="submit">Next</button>
            </form>
            <form method="get" action="/tree_testing" style="display: inline;">
                <button type="submit" class="back-button">← Back</button>
            </form>
        </div>
    </div>
</body>
</html>
