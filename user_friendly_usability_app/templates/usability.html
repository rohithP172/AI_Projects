<!DOCTYPE html>
<html>
<head>
    <title>Usability Evaluation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        let startTime, endTime;

        function startTimer() {
            startTime = new Date();
            document.getElementById('status').textContent = "Timer started...";
        }

        function stopTimer() {
            endTime = new Date();
            const seconds = Math.floor((endTime - startTime) / 1000);
            document.getElementById('time_taken').value = seconds;
            document.getElementById('status').textContent = `Time recorded: ${seconds} seconds`;
        }
    </script>
</head>
<body>
<div class="container">
    <h2>Step 1 of 7: Usability Evaluation</h2>

    <div class="progress-bar">
        <div class="step done">1</div>
        <div class="step">2</div>
        <div class="step">3</div>
        <div class="step">4</div>
        <div class="step">5</div>
        <div class="step">6</div>
        <div class="step">7</div>
    </div>

    <form method="post">
        <label for="task_result">Task Result</label>
        <input type="text" id="task_result" name="task_result" value="{{ task_result }}" required>

        <label for="task_difficulty">Task Difficulty (1-5)</label>
        <input type="number" id="task_difficulty" name="task_difficulty" value="{{ task_difficulty }}" required>

        <label for="task_feedback">User Feedback</label>
        <textarea id="task_feedback" name="task_feedback">{{ task_feedback }}</textarea>

        <label>⏱️ Task Completion Timer</label><br>
        <button type="button" onclick="startTimer()">Start</button>
        <button type="button" onclick="stopTimer()">Stop</button>
        <p id="status" style="font-weight:bold; color:green;"></p>
        <input type="hidden" id="time_taken" name="time_taken">

        <br><button type="submit">Next</button>
    </form>
</div>
</body>
</html>
