
<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #e0c3fc, #8ec5fc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: white;
    border-radius: 16px;
    padding: 40px;
    width: 80%;
    max-width: 600px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    text-align: center;
  }

  input, button {
    margin-top: 10px;
    padding: 10px;
    width: 90%;
    font-size: 1em;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  button {
    background-color: #4f46e5;
    color: white;
    cursor: pointer;
  }

  .response {
    margin-top: 20px;
    background: #f0f9ff;
    padding: 15px;
    border-radius: 8px;
    min-height: 40px;
  }

  .nav {
    position: absolute;
    top: 20px;
    left: 20px;
  }

  .nav a {
    margin-right: 15px;
    color: white;
    text-decoration: none;
    font-weight: bold;
  }
</style>

</head>
<body>
  <div class="container">
    <h2>Welcome!</h2>
    <p>Choose an experience:</p>
    <a href="/chatbot"><button>Chatbot</button></a><br/>
    <a href="/assistant"><button>Virtual Assistant</button></a>
  </div>
</body>
</html>
