<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User-Friendly Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="step-container">
    <div class="container">
        <h2>Step 3 of 4: User-Friendliness Feedback</h2>
        <div class="progress-bar">
            <div class="step done">1</div>
            <div class="step done">2</div>
            <div class="step current">3</div>
            <div class="step">4</div>
        </div>

        <form method="post" action="/user_evaluation_results">
            <p><strong>Was the navigation intuitive?</strong></p>
            <label><input type="radio" name="uf_navigation" value="Yes" required> Yes</label><br>
            <label><input type="radio" name="uf_navigation" value="No"> No</label>

            <p><strong>Was the visual design appealing?</strong></p>
            <label><input type="radio" name="uf_visuals" value="Yes" required> Yes</label><br>
            <label><input type="radio" name="uf_visuals" value="No"> No</label>

            <label><strong>Any Suggestions?</strong></label><br>
            <textarea name="uf_notes">{{ session.get('uf_notes', '') }}</textarea>

            <br>
            <button type="submit">Next: Final Results</button>
        </form>
        <form method="get" action="/cognitive_walkthrough">
    <button type="submit">Previous</button>
</form>

    </div>
</div>
</body>
</html>
