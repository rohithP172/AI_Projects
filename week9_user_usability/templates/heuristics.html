<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heuristics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="step-container">
        <div class="container">
            <h2>Step 3 of 7: Heuristic Evaluation</h2>
            <div class="progress-bar">
                <div class="step done">1</div>
                <div class="step done">2</div>
                <div class="step ">3</div>
                <div class="step ">4</div>
                <div class="step ">5</div>
                <div class="step">6</div>
                <div class="step">7</div>
            </div>

            <form method="post">
                <label for="heuristic_issue">Describe a usability issue:</label>
                <textarea id="heuristic_issue" name="heuristic_issue" required>{{ heuristic_issue }}</textarea>

                <label for="heuristic_principle">Which heuristic principle does it violate?</label>
                <input type="text" id="heuristic_principle" name="heuristic_principle" value="{{ heuristic_principle }}">

                <button type="submit">Next</button>
            </form>
            <form method="get" action="/sus" style="display: inline;">
                <button type="submit" class="back-button">← Back</button>
            </form>
        </div>
    </div>
</body>
</html>
